<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password — Route Master Africa</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header class="navbar" role="banner">
      <a href="/" class="navbar__brand">
        <span class="navbar__logo" aria-hidden="true"></span>
        Route Master Africa
      </a>
      <nav class="navbar__nav" aria-label="Main navigation">
        <a href="/login">Sign In</a>
      </nav>
    </header>

    <main class="page page--narrow" id="main-content">
      <div class="card">
        <div class="section-header">
          <div>
            <h1 class="section-title">Reset Password</h1>
            <p class="section-subtitle">Enter your new password below.</p>
          </div>
        </div>

        <form
          method="POST"
          action="{{ url_for('reset_password', token=token) }}"
          class="form-grid"
        >
          <div class="field form-grid--full">
            <label for="password">New Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter new password"
              required
            />
          </div>

          <div class="field form-grid--full">
            <label for="confirm_password">Confirm Password</label>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Re-enter password"
              required
            />
          </div>

          <div class="form-grid--full flex gap-2 items-center">
            <button type="submit" class="btn btn-primary">
              Reset Password
            </button>
            <a href="/login" class="btn btn-secondary">Back to Login</a>
          </div>
        </form>
      </div>
    </main>

    {% include "loader_alerts.html" %}
  </body>
</html>
