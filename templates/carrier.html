<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrier Dashboard — Route Master Africa</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <!-- ── Navbar ──────────────────────────────────────────── -->
    <header class="navbar" role="banner">
      <a href="/" class="navbar__brand">
        <span class="navbar__logo" aria-hidden="true"></span>
        Route Master Africa
      </a>
      <nav class="navbar__nav" aria-label="Main navigation">
        <span class="text-sm text-muted">Carrier</span>
        <a href="/logout" class="nav-logout">Log out</a>
      </nav>
    </header>

    <main class="page" id="main-content">
      <div class="section-header">
        <div>
          <h1 class="section-title">Carrier Dashboard</h1>
          <p class="section-subtitle">
            Manage your containers and track shipments.
          </p>
        </div>
        <button
          id="toggle-form-btn"
          class="btn btn-primary"
          aria-expanded="false"
          aria-controls="create-form-panel"
        >
          + New Container
        </button>
      </div>

      <div
        id="create-form-panel"
        class="form-panel"
        role="region"
        aria-label="Create container form"
      >
        <div class="card mb-3">
          <h2 class="section-title mb-2">Create Container</h2>

          <form method="POST" action="/carrier" novalidate>
            <div class="form-grid">
              <div class="field">
                <label for="cont_type">Container Type</label>
                <select id="cont_type" name="cont_type" required>
                  <option value="" disabled selected>Select type</option>
                  <option value="20ft">20FT</option>
                  <option value="40ft">40FT</option>
                  <option value="truck_small">Small Truck</option>
                  <option value="truck_large">Large Truck</option>
                </select>
              </div>

              <!-- Max Weight -->
              <div class="field">
                <label for="max_weight">Max Weight (kg)</label>
                <input
                  type="number"
                  id="max_weight"
                  name="max_weight"
                  placeholder="e.g. 28000"
                  min="1"
                  step="1"
                  required
                />
              </div>

              <!-- Max CBM -->
              <div class="field">
                <label for="max_cbm">Max Volume (CBM)</label>
                <input
                  type="number"
                  id="max_cbm"
                  name="max_cbm"
                  placeholder="e.g. 67.5"
                  min="0.1"
                  step="0.1"
                  required
                />
              </div>

              <!-- Price per kg -->
              <div class="field">
                <label for="price_weight">Price / kg (USD)</label>
                <input
                  type="number"
                  id="price_weight"
                  name="price_weight"
                  placeholder="e.g. 0.05"
                  min="0"
                  step="0.01"
                  required
                />
              </div>

              <!-- Price per CBM -->
              <div class="field">
                <label for="price_cbm">Price / CBM (USD)</label>
                <input
                  type="number"
                  id="price_cbm"
                  name="price_cbm"
                  placeholder="e.g. 12.00"
                  min="0"
                  step="0.01"
                  required
                />
              </div>

              <!-- Departure Date -->
              <div class="field">
                <label for="departure_date">Departure Date</label>
                <input
                  type="date"
                  id="departure_date"
                  name="departure_date"
                  required
                />
              </div>
