<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Route Master Africa</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header class="navbar" role="banner">
      <a href="/" class="navbar__brand">
        <span class="navbar__logo" aria-hidden="true"></span>
        Route Master Africa
      </a>
      <nav class="navbar__nav" aria-label="Main navigation">
        <a href="/login">Sign In</a>
      </nav>
    </header>

    <main class="page page--narrow" id="main-content">
      <div class="card">
        <div class="section-header">
          <div>
            <h1 class="section-title">Forgot Password</h1>
            <p class="section-subtitle">
              Enter your account email to receive a password reset link.
            </p>
          </div>
        </div>

        <form method="POST" action="/forgot-password" class="form-grid">
          <div class="field form-grid--full">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
            />
          </div>

          <div class="form-grid--full flex gap-2 items-center">
            <button type="submit" class="btn btn-primary">
              Send Reset Link
            </button>
            <a href="/login" class="btn btn-secondary">Back to Login</a>
          </div>
        </form>
      </div>
    </main>

    {% include "loader_alerts.html" %}
  </body>
</html>
