<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — Route Master Africa</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      html,
      body {
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        background: var(--bg);
      }

      /* ── Split layout ── */
      .auth-split {
        display: flex;
        flex: 1;
        min-height: 100vh;
      }

      /* Left: image panel */
      .auth-split__image {
        flex: 1;
        position: relative;
        background-image: url("{{ url_for('static', filename='images/photo-1616432043562-3671ea2e5242.avif') }}");
        background-size: cover;
        background-position: center;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 3rem;
        min-height: 100vh;
      }
      .auth-split__image::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          160deg,
          rgba(10, 30, 22, 0.55) 0%,
          rgba(10, 30, 22, 0.8) 100%
        );
      }
      .auth-split__brand {
        position: absolute;
        top: 2rem;
        left: 2.5rem;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        color: #fff;
        font-family: var(--font-display);
        font-size: 1.1rem;
        font-weight: 600;
        z-index: 1;
        text-decoration: none;
      }
      .auth-split__brand-logo {
        width: 34px;
        height: 34px;
        background: var(--green-600);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1rem;
        flex-shrink: 0;
      }
      .auth-split__tagline {
        position: relative;
        z-index: 1;
      }
      .auth-split__tagline-text {
        font-family: var(--font-display);
        font-size: clamp(1.3rem, 2.5vw, 1.9rem);
        font-weight: 600;
        color: #fff;
        line-height: 1.3;
        margin-bottom: 0.75rem;
        max-width: 380px;
      }
      .auth-split__tagline-sub {
        font-size: 0.875rem;
        color: rgba(255, 255, 255, 0.6);
        max-width: 340px;
        line-height: 1.6;
      }
      .auth-split__badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        margin-top: 1.2rem;
        background: rgba(79, 168, 138, 0.18);
        border: 1px solid rgba(79, 168, 138, 0.35);
        border-radius: 999px;
        padding: 0.3rem 0.85rem;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--green-400);
      }

      /* Right: form panel */
      .auth-split__form {
        width: 480px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 3.5rem;
        background: var(--surface);
        overflow-y: auto;
      }
      .auth-form {
        width: 100%;
        max-width: 380px;
      }
      .auth-form__back {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.8rem;
        color: var(--muted);
        margin-bottom: 2rem;
        transition: color 0.15s;
      }
      .auth-form__back:hover {
        color: var(--green-700);
      }
      .auth-form__title {
        font-family: var(--font-display);
        font-size: 1.75rem;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 0.4rem;
      }
      .auth-form__sub {
        font-size: 0.875rem;
        color: var(--muted);
        margin-bottom: 2rem;
      }
      .auth-form__sub a {
        color: var(--green-600);
        font-weight: 600;
      }
      .auth-form .field {
        margin-bottom: 1.1rem;
      }
      .auth-form .field label {
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-soft);
        display: block;
        margin-bottom: 0.35rem;
      }
      .auth-form .field input {
        width: 100%;
        padding: 0.7rem 1rem;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.9rem;
        color: var(--text);
        background: var(--bg);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .auth-form .field input:focus {
        border-color: var(--green-600);
        box-shadow: 0 0 0 3px rgba(58, 122, 96, 0.1);
        background: #fff;
      }
      .auth-form .field input::placeholder {
        color: var(--muted);
      }
      .auth-form__btn {
        width: 100%;
        padding: 0.85rem;
        background: var(--green-900);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        font-family: var(--font-body);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 0.5rem;
        transition: background 0.15s;
      }
      .auth-form__btn:hover {
        background: var(--green-800);
      }

      @media (max-width: 820px) {
        .auth-split__image {
          display: none;
        }
        .auth-split__form {
          width: 100%;
          padding: 2.5rem 1.5rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="auth-split">
      <!-- ── Left image panel ── -->
      <div class="auth-split__image">
        <a href="/" class="auth-split__brand">
          <span class="auth-split__brand-logo"></span>
          Route Master Africa
        </a>
        <div class="auth-split__tagline">
          <p class="auth-split__tagline-text">
            Africa's smarter way to consolidate freight
          </p>
          <p class="auth-split__tagline-sub">
            Connect with verified carriers, book shared container space, and
            move cargo across borders with confidence.
          </p>
          <span class="auth-split__badge">Pan-African Logistics</span>
        </div>
      </div>

      <!-- ── Right form panel ── -->
      <div class="auth-split__form">
        <div class="auth-form">
          <a href="/" class="auth-form__back">← Back to home</a>

          <h1 class="auth-form__title">Welcome back</h1>
          <p class="auth-form__sub">
            Don't have an account? <a href="/register">Sign up free</a>
          </p>

          <form action="/login" method="POST">
            <div class="field">
              <label for="email">Email Address</label>
              <input
                type="email"
                name="email"
                id="email"
                placeholder="you@example.com"
              />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Your password"
              />
            </div>
            <button type="submit" class="auth-form__btn">Sign In</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      document.querySelector("form").addEventListener("submit", function (e) {
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;
        if (!email.includes("@")) {
          alert("Please enter a valid email address.");
          e.preventDefault();
          return;
        }
        if (password.length < 6) {
          alert("Password must be at least 6 characters.");
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>
