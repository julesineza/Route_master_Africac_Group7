<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - Route Master Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #f7faf8;
      min-height: 100vh;
    }

    /* navbar */
    .navbar {
      background-color: #1a4731;
      height: 64px;
      display: flex;
      align-items: center;
      padding-left: 48px;
    }

    .logo-box {
      background-color: #3db870;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-box svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .logo-name {
      font-family: 'DM Serif Display', serif;
      color: white;
      font-size: 17px;
      margin-left: 10px;
    }

    /* main page area */
    .page {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 48px 24px;
    }

    /* white card */
    .card {
      background-color: white;
      border-radius: 16px;
      padding: 48px;
      width: 520px;
      box-shadow: 0px 4px 32px rgba(26, 71, 49, 0.09);
    }

    .card h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 30px;
      color: #111c17;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 14px;
      color: #6b8577;
      margin-bottom: 28px;
    }

    .card p a {
      color: #2d7a4f;
      font-weight: 600;
      text-decoration: none;
    }

    /* trader carrier tabs */
    .tabs {
      display: flex;
      background-color: #e8f5ee;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #6b8577;
      cursor: pointer;
    }

    .tab-btn.active {
      background-color: white;
      color: #1a4731;
      box-shadow: 0px 2px 8px rgba(26, 71, 49, 0.12);
    }

    /* two fields side by side */
    .two-fields {
      display: flex;
      gap: 16px;
      margin-bottom: 18px;
    }

    .two-fields .field {
      flex: 1;
    }

    /* single field */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #111c17;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #d0e6d9;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #111c17;
      outline: none;
    }

    .field input::placeholder {
      color: #b5cfc2;
    }

    .field input:focus {
      border-color: #2d7a4f;
    }

    /* carrier extra section */
    .carrier-section {
      display: none;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background-color: #d0e6d9;
    }

    .divider span {
      font-size: 12px;
      color: #6b8577;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* submit button */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background-color: #1a4731;
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
    }

    .submit-btn:hover {
      background-color: #2d7a4f;
    }

    /* terms text */
    .terms {
      font-size: 12px;
      color: #6b8577;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }

    .terms a {
      color: #2d7a4f;
      text-decoration: none;
      font-weight: 500;
    }

    /* hidden role select for backend */
    #role {
      display: none;
    }
  </style>
</head>

<body>

  <!-- navbar -->
  <div class="navbar">
    <div class="logo-box">
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>
    <span class="logo-name">Route Master Africa</span>
  </div>

  <!-- main content -->
  <div class="page">
    <div class="card">

      <h1>Create your account</h1>
      <p>Already have an account? <a href="/login">Sign in</a></p>

      <!-- trader / carrier tabs -->
      <div class="tabs">
        <button type="button" class="tab-btn active" onclick="switchTab('trader')">I'm a Trader</button>
        <button type="button" class="tab-btn" onclick="switchTab('carrier')">I'm a Carrier</button>
      </div>

      <!-- form -->
      <form action="/register" method="POST">

        <!-- hidden role field that flask reads -->
        <select name="role" id="role">
          <option value="trader">trader</option>
          <option value="carrier">carrier</option>
        </select>

        <!-- name and phone side by side -->
        <div class="two-fields">
          <div class="field">
            <label for="name">Full Name</label>
            <input type="text" name="name" id="name" placeholder="e.g. David Manzi">
          </div>
          <div class="field">
            <label for="phone_number">Phone Number</label>
            <input type="tel" name="phone_number" id="phone_number" placeholder="0788 000 000">
          </div>
        </div>

        <!-- email -->
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" name="email" id="email" placeholder="you@example.com">
        </div>

        <!-- password -->
        <div class="field">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" placeholder="At least 6 characters">
        </div>

        <!-- carrier only fields -->
        <div class="carrier-section" id="carrierSection">
          <div class="divider">
            <div class="divider-line"></div>
            <span>Carrier Details</span>
            <div class="divider-line"></div>
          </div>

          <div class="two-fields">
            <div class="field">
              <label for="company_name">Company Name</label>
              <input type="text" name="company_name" id="company_name" placeholder="Your company">
            </div>
            <div class="field">
              <label for="licence_number">License Number</label>
              <input type="text" name="licence_number" id="licence_number" placeholder="e.g. RW-123456">
            </div>
          </div>
        </div>

        <button type="submit" class="submit-btn">Create Account</button>

        <p class="terms">
          By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
        </p>

      </form>
    </div>
  </div>

  <script>
    function switchTab(role) {
      document.getElementById('role').value = role;

      var tabs = document.querySelectorAll('.tab-btn');
      tabs[0].className = 'tab-btn';
      tabs[1].className = 'tab-btn';

      if (role === 'trader') {
        tabs[0].className = 'tab-btn active';
        document.getElementById('carrierSection').style.display = 'none';
      } else {
        tabs[1].className = 'tab-btn active';
        document.getElementById('carrierSection').style.display = 'block';
      }
    }

    document.querySelector('form').addEventListener('submit', function(e) {
      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var phone = document.getElementById('phone_number').value;
      var password = document.getElementById('password').value;
      var role = document.getElementById('role').value;

      if (name.length < 3) {
        alert('Name must be at least 3 characters.');
        e.preventDefault();
        return;
      }

      if (!email.includes('@')) {
        alert('Please enter a valid email address.');
        e.preventDefault();
        return;
      }

      if (phone.length !== 10) {
        alert('Phone number must be 10 digits.');
        e.preventDefault();
        return;
      }

      if (password.length < 6) {
        alert('Password must be at least 6 characters.');
        e.preventDefault();
        return;
      }

      if (role === 'carrier') {
        var company = document.getElementById('company_name').value;
        var licence = document.getElementById('licence_number').value;
        if (company === '' || licence === '') {
          alert('Please fill in your company name and licence number.');
          e.preventDefault();
          return;
        }
      }
    });
  </script>

</body>
</html>
